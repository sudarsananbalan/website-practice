<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>HTML & CSS Sandbox</title>
  </head>
  <body>
    <main class="container">
      <div class="card">
        <h1>Need to hire a freelancer?</h1>
        <p>Sign up, type what you need and receive quotes in seconds.</p>
        <form>
          <div class="form-group">
            <input
              type="text"
              id="text"
              class="text"
              placeholder="What do you need done?"
            />
          </div>
          <div class="form-group">
            <button type="submit">Post a project.</button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
